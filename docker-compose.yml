version: "3.9"
services:
  redis:
    image: redis:7
    container_name: crypto_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: crypto_api
    restart: always
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    ports:
      - "8000:8000"